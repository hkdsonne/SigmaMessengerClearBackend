  # Сервис аутентификации
  auth_service:
    env_file:
      - .env
    build:
      context: .
      dockerfile: AuthService/Dockerfile
      #
      args:
        - SERVICE_PORT=${AUTH_SERVICE_PORT}
    #
    container_name: auth_service_to_messenger
    #
    restart: always
    #
    environment:
      - SERVICE_PORT=${AUTH_SERVICE_PORT}
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT}
      # Для работы с RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_DEFAULT_VHOST:-/}
      #
      - FRONT_IP=${FRONT_IP}
      #
      # Для работы с PostgreSQL
      - POSTGRESQL_HOST=${POSTGRESQL_HOST}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT}
      - POSTGRESQL_DATABASE_USERS=${POSTGRESQL_DATABASE_USERS}
      - POSTGRESQL_USERNAME_USERS=${POSTGRESQL_USERNAME_USERS}
      - POSTGRESQL_PASSWORD_USERS=${POSTGRESQL_PASSWORD_USERS}
      # SSL для постгреса

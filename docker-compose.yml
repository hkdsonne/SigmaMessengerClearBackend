#
#
# Описание сетей
# Три отдельных сети:
## 1. back_net_internet - Бэкенд с доступом в интернет - обращение к ним напрямую
## 2. back_net_no_internet - Бэкенд без доступа в интернет - доступ через брокер
## 3. broker_net_internet - Брокер с доступом к интернету - обращение к сервисам бэка извне
networks:
  broker_net_internet:
    # bridge - закрытая сеть на одном хосте. Внутри сети компоуза каждый 
    #   сервис будет иметь свой ip
    # host - без сетевой изоляции. Будет занимать порт адреса хоста
    # overlay - соединяет несколько хостов с Docker между собой
    # macvlan - каждый контейнер будет иметь свой мак адрес, будет как 
    #   отдельный сетевой адаптер в ОС хоста
    # ipvlan - аналог macvlan, только все контейнеры будут иметь общий мак
    # none - полностью отключить сеть для контейнера
    driver: bridge
    #
    # Опционально - параметры сети
    ipam:
      config:
        - subnet: 172.24.0.0/24
          gateway: 172.24.0.1
        #- subnet: 172.24.0.0/16 # Резервирование всей сети 172.24.х.х
          #ip_range: 172.24.0.0/24 # Выделение конкретных адресов
    #
    # Настройка межконтейнерного взаимодействие -
    ## нужно будет связать сети фронта и бэка
    #driver_opts:
    #  # Название виртуального моста в хостовой ОС
    #  com.docker.network.bridge.name: "broker_net_internet_br"
    #  #
    #  # Разрешить межконтейнерное взаимодействие
    #  com.docker.network.bridge.enable_icc: "true"
    #  #
    #  # Разрешить контейнеру доступ в интернет - работа с сервисами извне, получение обновлений, NTP
    #  com.docker.network.bridge.enable_ip_masquerade: "false"
  #
  back_net_no_internet:
    driver: bridge
    #
    internal: true # Запрет доступа в интернет
    #
    ipam:
      config:
        - subnet: 172.25.0.0/24
          gateway: 172.25.0.1
    #
    #driver_opts:
     # # Название виртуального моста в хостовой ОС
     # com.docker.network.bridge.name: "back_net_no_internet_br"
     # #

      - DB_TRUST_SERVER_CERT=${DB_TRUST_SERVER_CERT}
      - DB_AUTH_CLIENT_CERT_PATH=${DB_AUTH_CLIENT_CERT_PATH}
      - DB_AUTH_CA_CERT_PATH=${DB_AUTH_CA_CERT_PATH}
      - DB_USER_CLIENT_CERT_PATH=${DB_USER_CLIENT_CERT_PATH}
      - DB_USER_CA_CERT_PATH=${DB_USER_CA_CERT_PATH}
      - DB_FILE_CLIENT_CERT_PATH=${DB_FILE_CLIENT_CERT_PATH}
      - DB_FILE_CA_CERT_PATH=${DB_FILE_CA_CERT_PATH}
      - DB_CHAT_CLIENT_CERT_PATH=${DB_CHAT_CLIENT_CERT_PATH}
      - DB_CHAT_CA_CERT_PATH=${DB_CHAT_CA_CERT_PATH}
      #
      # Адрес почтового сервиса
      - MAIL_SERVICE_IP=${MAIL_SERVICE_IP}
      #
      # Настройки приложения
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:${AUTH_SERVICE_PORT}
      #
      # Логирование
      - Logging__LogLevel__Default=${LOG_LEVEL:-Information}
      - Logging__LogLevel__Microsoft_AspNetCore=${LOG_LEVEL:-Warning}
    #
    # Лимиты ресурсов
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    #
    volumes:
      # Логи приложения
      - auth_service_logs:/app/logs
      # Сертификаты для mTLS (только чтение)
      - ./Postgres_SSL_certs/auth-service:/certs:ro
    #
    # Сети: Сеть с доступом к интернету. Тк это вебсокет и он не работает через брокер
